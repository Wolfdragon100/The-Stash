<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Stash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a18;
      --surface: #242421;
      --text: #f0ede6;
      --muted: #9e9b92;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Landing page ── */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    #landing.hide {
      animation: fadeOut 0.5s ease forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    .landing-label {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* Illustrated drawer */
    .drawer-wrap {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .drawer-wrap:hover {
      transform: translateY(-4px);
    }

    .drawer-wrap:active {
      transform: translateY(0px);
    }

    /* SVG drawer open animation */
    .drawer-front {
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      transform-origin: bottom center;
    }

    .drawer-wrap.opening .drawer-front {
      transform: translateY(60px);
    }

    .drawer-contents {
      opacity: 0;
      transition: opacity 0.3s ease 0.3s;
    }

    .drawer-wrap.opening .drawer-contents {
      opacity: 1;
    }

    .click-hint {
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: -0.5rem;
    }

    /* ── Main content ── */
    #main-content {
      display: none;
      opacity: 0;
      padding: 2.5rem 1.5rem 4rem;
    }

    #main-content.visible {
      display: block;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .updated {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .card-swatch {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      height: 200px;
      overflow: hidden;
    }

    .card-swatch img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      background: var(--surface);
      padding: 0.75rem 0.85rem 0.9rem;
      flex: 1;
    }

    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .card-desc {
      margin-top: 0.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty-badge {
      opacity: 0.38;
      position: relative;
    }

    .empty-badge::after {
      content: 'OUT';
      position: absolute;
      top: 10px;
      right: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <div class="landing-label">What's in the snack drawer?</div>
  <div class="click-hint" style="margin-top:-1rem">Click to see goodies</div>

  <div class="drawer-wrap" id="drawer-wrap">
    <svg width="260" height="200" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Drawer body / casing -->
      <rect x="10" y="10" width="240" height="180" rx="12" fill="#2e2318" stroke="#4a3828" stroke-width="2"/>
      <!-- Inside of drawer (snacks revealed when open) -->
      <g class="drawer-contents">
        <text x="50" y="100" font-size="28">🍫</text>
        <text x="100" y="100" font-size="28">🥜</text>
        <text x="150" y="100" font-size="28">🍬</text>
        <text x="95" y="135" font-size="28">🌾</text>
        <text x="140" y="135" font-size="22">🥨</text>
      </g>
      <!-- Drawer face (slides down on click) -->
      <g class="drawer-front">
        <rect x="10" y="10" width="240" height="180" rx="12" fill="#4a3220" stroke="#6b4d30" stroke-width="2"/>
        <!-- Wood grain lines -->
        <line x1="10" y1="65" x2="250" y2="65" stroke="#3d2a18" stroke-width="1" opacity="0.6"/>
        <line x1="10" y1="120" x2="250" y2="120" stroke="#3d2a18" stroke-width="1" opacity="0.6"/>
        <!-- Handle -->
        <rect x="95" y="88" width="70" height="14" rx="7" fill="#c9a97a" stroke="#a8885a" stroke-width="1.5"/>
        <circle cx="118" cy="95" r="3" fill="#a8885a"/>
        <circle cx="142" cy="95" r="3" fill="#a8885a"/>
      </g>
    </svg>
  </div>

  <div class="click-hint">tap anywhere on the drawer</div>
</div>

<!-- Main snack page -->
<div id="main-content">
  <header>
    <h1>The Stash</h1>
    <p>😋</p>
    <div class="updated" id="updated-date"></div>
  </header>
  <div class="grid" id="snack-grid"></div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  const drawerWrap = document.getElementById('drawer-wrap');
  const landing = document.getElementById('landing');
  const mainContent = document.getElementById('main-content');

  drawerWrap.addEventListener('click', () => {
    drawerWrap.classList.add('opening');
    setTimeout(() => {
      landing.classList.add('hide');
      setTimeout(() => {
        landing.style.display = 'none';
        mainContent.classList.add('visible');
      }, 500);
    }, 800);
  });

  // ─── EDIT THIS DATE whenever you update the inventory ───
  const lastUpdated = "June 25, 2026";
  // ────────────────────────────────────────────────────────

  document.getElementById('updated-date').textContent = "Last updated: " + lastUpdated;

  const snacks = [
    { name: "Cinnamon Pistachios", emoji: "<img src='cinnamonpistachios.png'>", color: "#c8863a", desc: "Yum :)", inStock: true },
    { name: "Seven Sundays Granola", emoji: "<img src='granola.webp'>", color: "#f2a7b0", desc: "Also yum :)", inStock: true },
    { name: "Fruit Jerky", emoji: "<img src='jerky.jpg'>", color: "#5a9cbd", desc: "Refrigerate for extra chewy toughness", inStock: true },
    { name: "Junkless Chewy Bars", emoji: "<img src='junkless.webp'>", color: "#c93a3a", desc: "🍓", inStock: true },
    { name: "Bear Fruit Splits", emoji: "<img src='fruit.jpg'>", color: "#b5c96a", desc: "Do bears like fruit?", inStock: true },
    { name: "Chocolate Walnuts", emoji: "<img src='chocowalnuts.jpg'>", color: "#4a2c1a", desc: "Definitely also yum :)", inStock: true },
    { name: "Blueberry Rollers", emoji: "<img src='Blueberry.webp'>", color: "#5b4fcf", desc: "Lightly Sweet Treat", inStock: true },
    { name: "Carob Cups", emoji: "<img src='missy.webp'>", color: "#5c3a1e", desc: "Only For Adventurous Snackers", inStock: true },
    { name: "Coconut Bits", emoji: "<img src='coconut.webp'>", color: "#d4b896", desc: "Taste the tropics", inStock: true },
    { name: "Kind Bar", emoji: "<img src='kind.jpg'>", color: "#e8924a", desc: "Peanuty Goodness", inStock: true },
    { name: "Cookies", emoji: "<img src='cookiec.webp'>", color: "#c9a05a", desc: "Crispy", inStock: true },
    { name: "Dried Mango", emoji: "<img src='mango.jpg'>", color: "#f5a623", desc: "Indulgent", inStock: true },
    { name: "Dried Pineapple", emoji: "<img src='pineapple.jpg'>", color: "#f5c842", desc: "Mmmm, tangy", inStock: true },
  ];

  const grid = document.getElementById('snack-grid');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  snacks.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (s.inStock ? '' : ' empty-badge');
    card.style.animationDelay = (i * 0.06) + 's';

    const srcMatch = s.emoji.match(/src='([^']+)'/);
    const imgSrc = srcMatch ? srcMatch[1] : null;

    card.innerHTML = `
      <div class="card-swatch" style="background:${s.color}">${s.emoji}</div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
    `;

    if (imgSrc) {
      card.addEventListener('click', () => {
        lightboxImg.src = imgSrc;
        lightbox.classList.add('active');
      });
    }

    grid.appendChild(card);
  });

  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('active');
  });
</script>

</body>
</html>
