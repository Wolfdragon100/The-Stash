<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snack Drawer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a18;
      --surface: #242421;
      --text: #f0ede6;
      --muted: #9e9b92;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .updated {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .card-swatch {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      height: 200px;
      overflow: hidden;
    }

    .card-swatch img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      background: var(--surface);
      padding: 0.75rem 0.85rem 0.9rem;
      flex: 1;
    }

    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .card-desc {
      margin-top: 0.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty-badge {
      opacity: 0.38;
      position: relative;
    }

    .empty-badge::after {
      content: 'OUT';
      position: absolute;
      top: 10px;
      right: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>Snack Drawer</h1>
  <p>Good stuff inside<br>😋</p>
  <div class="updated" id="updated-date"></div>
</header>

<div class="grid" id="snack-grid"></div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  // ─── EDIT THIS DATE whenever you update the inventory ───
  const lastUpdated = "June 25, 2026";
  // ────────────────────────────────────────────────────────

  document.getElementById('updated-date').textContent = "Last updated: " + lastUpdated;

  const snacks = [
    { name: "Cinnamon Pistachios", emoji: "<img src='cinnamonpistachios.png'>", color: "#c8863a", desc: "Yum :)", inStock: true },
    { name: "Chocolate Walnuts", emoji: "<img src='chocowalnuts.jpg'>", color: "#4a2c1a", desc: "Also Yum :)", inStock: true },
    { name: "Blueberry Rollers", emoji: "<img src='Blueberry.webp'>", color: "#5b4fcf", desc: "Lightly Sweet Treat", inStock: true },
    { name: "Carob Cups", emoji: "<img src='missy.webp'>", color: "#5c3a1e", desc: "For The Adventurous Snacker", inStock: true },
    { name: "Coconut Bits", emoji: "<img src='coconut.webp'>", color: "#d4b896", desc: "Taste the tropics", inStock: true },
    { name: "Kind Bar", emoji: "<img src='kind.jpg'>", color: "#e8924a", desc: "Peanuty Goodness", inStock: true },
    { name: "Cookies", emoji: "<img src='cookiec.webp'>", color: "#c9a05a", desc: "Crunchy", inStock: true },
    { name: "Dried Mango", emoji: "<img src='mango.jpg'>", color: "#f5a623", desc: "Indulgent", inStock: true },
    { name: "Dried Pineapple", emoji: "<img src='pineapple.jpg'>", color: "#f5c842", desc: "Mmmm, tangy", inStock: true },
  ];

  const grid = document.getElementById('snack-grid');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  snacks.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (s.inStock ? '' : ' empty-badge');
    card.style.animationDelay = (i * 0.06) + 's';

    const srcMatch = s.emoji.match(/src='([^']+)'/);
    const imgSrc = srcMatch ? srcMatch[1] : null;

    card.innerHTML = `
      <div class="card-swatch" style="background:${s.color}">${s.emoji}</div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
    `;

    if (imgSrc) {
      card.addEventListener('click', () => {
        lightboxImg.src = imgSrc;
        lightbox.classList.add('active');
      });
    }

    grid.appendChild(card);
  });

  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('active');
  });
</script>

</body>
</html>
